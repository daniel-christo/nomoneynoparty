<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCS TOOL SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Courier+Prime&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#fff;
font-family:'VT323',monospace;
margin:0;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(transparent 95%, rgba(255,255,255,.05) 100%),
linear-gradient(90deg,transparent 95%, rgba(255,255,255,.05) 100%);
background-size:3px 3px;
animation:bgMove 20s linear infinite;
z-index:-1;
opacity:.3;
}

@keyframes bgMove{
from{transform:translateY(0)}
to{transform:translateY(100px)}
}

/* ACCESS DENIED */

#accessDenied{
position:fixed;
inset:0;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
z-index:999999;
font-family:'Press Start 2P';
text-align:center;
}

.denied-box h1{
font-size:40px;
margin-bottom:20px;
}

.denied-box p{
font-size:14px;
opacity:.7;
}

#welcome{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
}

.title{
font-family:'Press Start 2P';
font-size:26px;
margin-bottom:40px;
}

.enter{
font-family:'Press Start 2P';
cursor:pointer;
animation:blink 1s infinite;
border:1px solid white;
padding:15px 30px;
}

.enter:hover{
background:white;
color:black;
}

@keyframes blink{
50%{opacity:.4}
}

.boot{
position:fixed;
inset:0;
background:#000;
padding:30px;
display:none;
white-space:pre-line;
font-size:20px;
}

.menu{
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
gap:25px;
}

.menu button{
padding:15px 40px;
background:#000;
color:#fff;
border:1px solid #fff;
font-family:'Press Start 2P';
cursor:pointer;
width:320px;
}

.menu button:hover{
background:#fff;
color:#000;
}

.tool{
display:none;
position:fixed;
inset:0;
background:#000;
overflow:auto;
padding:20px;
}

.back{
position:fixed;
top:10px;
left:10px;
z-index:9999;
padding:10px 20px;
background:black;
color:white;
border:1px solid white;
font-family:'Press Start 2P';
cursor:pointer;
}

.lock textarea{
width:100%;
height:160px;
background:#000;
color:#fff;
border:1px solid #fff;
padding:10px;
margin-bottom:15px;
}

.lock table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.lock th,.lock td{
border:1px solid #fff;
padding:8px;
}

.lock button{
background:#000;
border:1px solid #fff;
color:#fff;
padding:8px 15px;
cursor:pointer;
}

.badge{
padding:3px 8px;
border-radius:4px;
font-size:12px;
}

.locked{background:#a30000}
.change{background:#009688}

</style>

</head>

<body>

<div id="accessDenied">
<div class="denied-box">
<h1>ACCESS DENIED</h1>
<p>Unauthorized Developer Tools Detected</p>
</div>
</div>

<div id="welcome">
<div class="title">DCS TOOL SYSTEM</div>
<div class="enter" id="enterBtn">▶ ENTER SYSTEM</div>
</div>

<div class="boot" id="boot"></div>

<div class="menu" id="menu">
<button onclick="openTool('csv')">CSV MARKETING</button>
<button onclick="openTool('scatter')">SCATTER MAHJONG</button>
<button onclick="openTool('lock')">LOCK UNLOCK</button>
<button onclick="openTool('shortcut')">SHORTCUT</button>
</div>

<div id="toolContainer" class="tool"></div>

<script>

function showDenied(){
document.getElementById("accessDenied").style.display="flex"
}

document.addEventListener('contextmenu', function(e) {
e.preventDefault();
showDenied()
});

document.onkeydown = function(e) {

if (e.keyCode == 123) {
showDenied()
return false;
}

if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
showDenied()
return false;
}

if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
showDenied()
return false;
}

if (e.ctrlKey && e.shiftKey && e.keyCode == 67) {
showDenied()
return false;
}

if (e.ctrlKey && e.keyCode == 85) {
showDenied()
return false;
}

};

const welcome = document.getElementById("welcome")
const boot = document.getElementById("boot")
const menu = document.getElementById("menu")
const enterBtn = document.getElementById("enterBtn")
const toolContainer = document.getElementById("toolContainer")

let entered=false

function enterSystem(){
if(entered) return
entered=true

welcome.style.display="none"
boot.style.display="block"

let text=`Booting DCS System...
Loading Modules...
Connecting Server...
Access Granted...`

let i=0

let t=setInterval(()=>{
boot.innerHTML+=text[i]
i++

if(i>=text.length){
clearInterval(t)
setTimeout(()=>{
boot.style.display="none"
menu.style.display="flex"
},800)
}

},20)
}

enterBtn.onclick=enterSystem

document.addEventListener("keydown",e=>{
if(e.key==="Enter") enterSystem()
})

function openTool(name){
menu.style.display="none"
toolContainer.style.display="block"

if(name==="lock") loadLock()
else if(name==="csv") loadCSV()
else if(name==="scatter") loadScatter()
else comingSoon(name)
}

function backMenu(){
toolContainer.style.display="none"
menu.style.display="flex"
}

function comingSoon(name){
toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>
<h2>${name} Coming Soon</h2>`
}

function loadCSV(){
toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>
<iframe src="https://daniel-christo.github.io/marketingresolved/" style="width:100%;height:100vh;border:none"></iframe>
`
}

function loadScatter(){
toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>
<iframe src="https://daniel-christo.github.io/scatter/" style="width:100%;height:100vh;border:none"></iframe>
`
}

function loadLock(){

toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>

<div class="lock">
<h2>DCS TOOL - LOCKED & PERGANTIAN DATA</h2>

<textarea id="logInput"></textarea>

<button id="processBtn">PROCESS</button>
<button id="clearBtn">CLEAR</button>

<table>
<thead>
<tr>
<th>No</th>
<th>User ID</th>
<th>Kategori</th>
<th>Detail</th>
<th>Action</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

<h3>OUTPUT</h3>
<textarea id="copyOutput"></textarea>

</div>
`

initLock()
}

function initLock(){

const logInput  = document.getElementById('logInput');
const resultBody = document.getElementById('resultBody');
const processBtn = document.getElementById('processBtn');
const clearBtn   = document.getElementById('clearBtn');
const copyOutput = document.getElementById('copyOutput');

function formatTanggal(tanggal){

const bulan = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
]

let t = tanggal.split("-")
return `${t[0]} ${bulan[parseInt(t[1])-1]} ${t[2]}`
}

function addRow(no,user,kategori,detail,tanggal,staff){

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${no}</td>
<td>${user}</td>
<td>${kategori}</td>
<td>${detail}</td>
<td><button class="copy-btn">Copy</button></td>
`

tr.querySelector(".copy-btn").onclick=()=>{

copyOutput.value=
`Info ko,
Staff ${staff}
Tanggal ${formatTanggal(tanggal)}

keterangan :
Locked pada user id ${user} dengan keterangan ${detail}`

copyOutput.select()
document.execCommand("copy")
}

resultBody.appendChild(tr)
}

function processLogs(){

resultBody.innerHTML=""
let no=1

let lines=logInput.value.split("\n")

for(let i=0;i<lines.length;i++){

let parts=lines[i].split("\t")
if(parts.length < 6) continue

let tanggal=parts[1].split(" ")[0]
let staff=parts[2]
let detail=parts[4]
let user=parts[5]

if(/locked/i.test(detail)){

let depositText=""

for(let j=i-1;j>=0;j--){

let prev=lines[j].split("\t")
if(prev.length < 6) continue

if(prev[5]===user && /deposit/i.test(prev[4])){

let match = prev[4].match(/deposit\s*(\d+)/i)

if(match){
depositText=`Manual Deposit ${match[1]}`
}

break
}

}

let finalText = depositText 
? `pemain invest dan ${depositText}` 
: detail

addRow(
no++,
user,
`<span class="badge locked">LOCK</span>`,
finalText,
tanggal,
staff
)

}

}

}

processBtn.onclick=processLogs

clearBtn.onclick=()=>{
resultBody.innerHTML=""
logInput.value=""
}

}

</script>

</body>
</html>
