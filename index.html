<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCS TOOL SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Courier+Prime&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#fff;
font-family:'VT323',monospace;
margin:0;
}

/* MENU */

.menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

.menu button{
padding:15px 40px;
background:#000;
color:#fff;
border:1px solid #333;
font-family:'Press Start 2P';
cursor:pointer;
width:320px;
transition:.2s;
}

.menu button:hover{
background:#111;
transform:translateY(-2px);
}

/* TOOL */

.tool{
display:none;
position:fixed;
inset:0;
background:#000;
overflow:auto;
padding:20px;
}

.back{
position:fixed;
top:15px;
left:15px;
padding:10px 20px;
background:#020617;
color:white;
border:1px solid #1e293b;
font-family:'Press Start 2P';
cursor:pointer;
border-radius:6px;
}

/* LOCK UI */

.lock{
max-width:1200px;
margin:auto;
}

.lock-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.lock-title{
font-family:'Press Start 2P';
font-size:14px;
opacity:.8;
}

.lock textarea{
width:100%;
height:160px;
background:#020617;
color:#fff;
border:1px solid #111;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

.lock button{
background:#020617;
border:1px solid #1e293b;
color:#fff;
padding:10px 18px;
margin-right:10px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.lock button:hover{
background:#0f172a;
transform:translateY(-1px);
}

.lock table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#020617;
border-radius:10px;
overflow:hidden;
}

.lock th{
background:#020617;
border-bottom:1px solid #111;
padding:14px;
font-size:11px;
font-family:'Press Start 2P';
opacity:.7;
}

.lock td{
padding:14px;
border-bottom:1px solid #111;
}

.lock tr:hover{
background:#020617;
}

/* CATEGORY */

.category{
padding:6px 14px;
border-radius:20px;
font-size:11px;
font-weight:bold;
letter-spacing:.5px;
}

.cat-change{
background:#0f766e;
}

.cat-lock{
background:#7f1d1d;
}

.copy-btn{
background:#020617;
border:1px solid #1e293b;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.copy-btn:hover{
background:#0f172a;
}

</style>

</head>

<body>

<div class="menu" id="menu">

<button onclick="openTool('csv')">CSV MARKETING</button>
<button onclick="openTool('scatter')">SCATTER MAHJONG</button>
<button onclick="openTool('lock')">LOCK UNLOCK</button>

</div>

<div id="toolContainer" class="tool"></div>

<script>

const menu=document.getElementById("menu")
const toolContainer=document.getElementById("toolContainer")

function openTool(name){

menu.style.display="none"
toolContainer.style.display="block"

if(name==="csv") loadCSV()
if(name==="scatter") loadScatter()
if(name==="lock") loadLock()

}

function backMenu(){
toolContainer.style.display="none"
menu.style.display="flex"
}

/* CSV */

function loadCSV(){

toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>

<iframe 
src="https://daniel-christo.github.io/marketingresolved/" 
style="width:100%;height:100vh;border:none">
</iframe>
`

}

/* SCATTER */

function loadScatter(){

toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>

<iframe 
src="https://daniel-christo.github.io/scatter/" 
style="width:100%;height:100vh;border:none">
</iframe>
`

}

/* LOCK */

function loadLock(){

toolContainer.innerHTML=`

<button class="back" onclick="backMenu()">BACK</button>

<div class="lock">

<div class="lock-header">
<div class="lock-title">DCS LOCK / PERGANTIAN DATA</div>
</div>

<textarea id="logInput" placeholder="Paste log disini..."></textarea>

<div>
<button id="processBtn">PROCESS</button>
<button id="clearBtn">CLEAR</button>
</div>

<table>

<thead>
<tr>
<th>No</th>
<th>User</th>
<th>Kategori</th>
<th>Detail</th>
<th>Action</th>
</tr>
</thead>

<tbody id="resultBody"></tbody>

</table>

<textarea id="copyOutput" style="margin-top:20px;height:120px;"></textarea>

</div>
`

initLock()

}

function initLock(){

const logInput=document.getElementById("logInput")
const resultBody=document.getElementById("resultBody")
const copyOutput=document.getElementById("copyOutput")

document.getElementById("processBtn").onclick=()=>{

resultBody.innerHTML=""
let no=1

let lines=logInput.value.split("\n")

lines.forEach(line=>{

let p=line.split("\t")
if(p.length<6) return

let staff=p[2]
let action=p[3]
let detail=p[4]
let user=p[5]

/* LOCK */

if(/locked/i.test(detail) && !/unlock/i.test(detail)){

let ket=detail
.replace(/update info\s*:\s*/i,"")
.replace(/First Register\s*->\s*/i,"")
.replace(/Status\s*->\s*Locked/i,"")

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${no++}</td>
<td>${user}</td>
<td><span class="category cat-lock">LOCKED - ${ket}</span></td>
<td>${ket}</td>
<td><button class="copy-btn">Copy</button></td>
`

tr.querySelector("button").onclick=()=>{

copyOutput.value=
`Info ko,
Staff ${staff}

keterangan :
Locked pada user id ${user} dengan keterangan ${ket}`

copyOutput.select()
document.execCommand("copy")

}

resultBody.appendChild(tr)

}

/* CHANGE */

if(/change user info/i.test(action) && /=>/.test(detail)){

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${no++}</td>
<td>${user}</td>
<td><span class="category cat-change">PERGANTIAN DATA REKENING</span></td>
<td>Pergantian Data</td>
<td><button class="copy-btn">Copy</button></td>
`

tr.querySelector("button").onclick=()=>{

copyOutput.value=
`Info ko,
Staff ${staff}

kendala :
Pergantian data pada user id ${user}`

copyOutput.select()
document.execCommand("copy")

}

resultBody.appendChild(tr)

}

})

}

document.getElementById("clearBtn").onclick=()=>{
resultBody.innerHTML=""
logInput.value=""
copyOutput.value=""
}

}

</script>

</body>
</html>
