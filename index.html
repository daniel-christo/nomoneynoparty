<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCS TOOL SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#fff;
font-family:'VT323',monospace;
margin:0;
}

.menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

.menu button{
padding:15px 40px;
background:#000;
color:#fff;
border:1px solid #333;
font-family:'Press Start 2P';
cursor:pointer;
width:320px;
}

.tool{
display:none;
position:fixed;
inset:0;
background:#000;
overflow:auto;
padding:20px;
}

.back{
position:fixed;
top:15px;
left:15px;
padding:10px 20px;
background:#020617;
color:white;
border:1px solid #1e293b;
font-family:'Press Start 2P';
cursor:pointer;
border-radius:6px;
}

.lock{
max-width:1200px;
margin:auto;
}

.lock textarea{
width:100%;
height:160px;
background:#020617;
color:#fff;
border:1px solid #111;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

.lock table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.lock th,.lock td{
padding:12px;
border-bottom:1px solid #111;
}

.category{
padding:6px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.cat-lock{
background:#7f1d1d;
}

.cat-change{
background:#0f766e;
}

.copy-btn{
background:#020617;
border:1px solid #1e293b;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
color:#fff;
}

</style>

</head>

<body>

<div class="menu" id="menu">
<button onclick="openTool('csv')">CSV MARKETING</button>
<button onclick="openTool('scatter')">SCATTER MAHJONG</button>
<button onclick="openTool('lock')">LOCK UNLOCK</button>
</div>

<div id="toolContainer" class="tool"></div>

<script>

const menu=document.getElementById("menu")
const toolContainer=document.getElementById("toolContainer")

function openTool(name){

menu.style.display="none"
toolContainer.style.display="block"

if(name==="csv") loadCSV()
if(name==="scatter") loadScatter()
if(name==="lock") loadLock()

}

function backMenu(){
toolContainer.style.display="none"
menu.style.display="flex"
}

function loadCSV(){
toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>
<iframe src="https://daniel-christo.github.io/marketingresolved/" style="width:100%;height:100vh;border:none"></iframe>
`
}

function loadScatter(){
toolContainer.innerHTML=`
<button class="back" onclick="backMenu()">BACK</button>
<iframe src="https://daniel-christo.github.io/scatter/" style="width:100%;height:100vh;border:none"></iframe>
`
}

function formatTanggal(tgl){

const bulan=[
"Januari","Februari","Maret","April",
"Mei","Juni","Juli","Agustus",
"September","Oktober","November","Desember"
]

let d=tgl.split(" ")[0].split("-")
return `${parseInt(d[0])} ${bulan[parseInt(d[1])-1]} ${d[2]}`

}

function loadLock(){

toolContainer.innerHTML=`

<button class="back" onclick="backMenu()">BACK</button>

<div class="lock">

<textarea id="logInput"></textarea>

<button id="processBtn">PROCESS</button>
<button id="clearBtn">CLEAR</button>

<table>
<thead>
<tr>
<th>No</th>
<th>User</th>
<th>Kategori</th>
<th>Detail</th>
<th>Action</th>
</tr>
</thead>

<tbody id="resultBody"></tbody>
</table>

<textarea id="copyOutput"></textarea>

</div>
`

initLock()
}

function initLock(){

const logInput=document.getElementById("logInput")
const resultBody=document.getElementById("resultBody")
const copyOutput=document.getElementById("copyOutput")

document.getElementById("processBtn").onclick=()=>{

resultBody.innerHTML=""
let no=1

logInput.value.split("\n").forEach(line=>{

try{

let p=line.split("\t")
if(p.length<6) return

let tanggal=formatTanggal(p[1])
let staff=p[2]
let action=p[3]
let detail=p[4]
let user=p[5]

/* LOCK */

if(/locked/i.test(detail) && !/unlock/i.test(detail)){

let ket=detail
.replace(/update info\s*:\s*/i,"")
.replace(/First Register\s*->\s*/i,"")
.replace(/Status\s*->\s*Locked/i,"")
.replace(/[,\.\s]+$/,"")
.trim()

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${no++}</td>
<td>${user}</td>
<td><span class="category cat-lock">LOCKED</span></td>
<td>${ket}</td>
<td><button class="copy-btn">Copy</button></td>
`

tr.querySelector("button").onclick=()=>{

copyOutput.value=
`Info ko,
Staff ${staff}
Tanggal ${tanggal}
kendala :
Locked pada user id ${user} dengan keterangan ${ket}`

copyOutput.select()
document.execCommand("copy")

}

resultBody.appendChild(tr)

}

/* CHANGE DATA */

if(/change user info/i.test(action) && /bank\s*:|acc\s*:|rek\s*:/i.test(detail)){

let beforeBank=(detail.match(/bank\s*:\s*(.*?)\s*=>/i)||[])[1]||"-"
let afterBank=(detail.match(/bank\s*:.*?=>\s*(.*?)(,|$)/i)||[])[1]||"-"

let beforeAcc=(detail.match(/acc\s*:\s*(.*?)\s*=>/i)||[])[1]||"-"
let afterAcc=(detail.match(/acc\s*:.*?=>\s*(.*?)(,|$)/i)||[])[1]||"-"

let beforeRek=(detail.match(/rek\s*:\s*(.*?)\s*=>/i)||[])[1]||"-"
let afterRek=(detail.match(/rek\s*:.*?=>\s*(.*?)(,|$)/i)||[])[1]||"-"

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${no++}</td>
<td>${user}</td>
<td><span class="category cat-change">PERGANTIAN DATA</span></td>
<td>Pergantian Data</td>
<td><button class="copy-btn">Copy</button></td>
`

tr.querySelector("button").onclick=()=>{

copyOutput.value=
`Info ko,
Staff ${staff}
Tanggal ${tanggal}
kendala :
Pergantian data pada user id ${user}
sebelumnya : ${beforeBank}, ${beforeAcc}, ${beforeRek}
sesudahnya : ${afterBank}, ${afterAcc}, ${afterRek}`

copyOutput.select()
document.execCommand("copy")

}

resultBody.appendChild(tr)

}

}catch(e){}

})

}

document.getElementById("clearBtn").onclick=()=>{
resultBody.innerHTML=""
logInput.value=""
copyOutput.value=""
}

}

</script>

</body>
</html>
